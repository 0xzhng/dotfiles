source = colors.conf
source = sddm-lock-vars.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $sddm_background_path
    color = $sddm_background_color
    blur_size = $sddm_background_blur_size
    blur_passes = $sddm_background_blur_passes
    brightness = $sddm_background_brightness
    vibrancy = $sddm_background_vibrancy
    contrast = 1.0
    noise = 0.0
}

# clock (mirrors Silent SDDM lock screen)
label {
    monitor =
    text = cmd[update:1000] $sddm_lock_clock_cmd
    color = $sddm_lock_clock_color
    font_size = $sddm_lock_clock_font_size
    font_family = $sddm_lock_clock_font
    shadow_size = 10
    shadow_passes = 2
    position = $sddm_lock_clock_pos_x, $sddm_lock_clock_pos_y
    halign = $sddm_lock_clock_halign
    valign = $sddm_lock_clock_valign
}

# date line under the clock
label {
    monitor =
    text = cmd[update:60000] $sddm_lock_date_cmd
    color = $sddm_lock_date_color
    font_size = $sddm_lock_date_font_size
    font_family = $sddm_lock_date_font
    shadow_size = 6
    shadow_passes = 1
    position = $sddm_lock_date_pos_x, $sddm_lock_date_pos_y
    halign = $sddm_lock_date_halign
    valign = $sddm_lock_date_valign
}

# session tag in top-left corner
label {
    monitor =
    text = $sddm_host_label
    color = $sddm_hint_color
    font_size = 12
    font_family = $sddm_login_font
    shadow_size = 0
    position = 60, 60
    halign = left
    valign = top
}

# display name
label {
    monitor =
    text = <b>$sddm_display_name</b>
    color = $sddm_username_color
    font_size = $sddm_display_font_size
    font_family = $sddm_login_font
    shadow_size = 12
    shadow_passes = 2
    position = 0, -110
    halign = center
    valign = center
}

# unix username
label {
    monitor =
    text = $sddm_username
    color = $sddm_username_sub_color
    font_size = $sddm_sub_display_font_size
    font_family = $sddm_login_font
    shadow_size = 6
    shadow_passes = 2
    position = 0, -50
    halign = center
    valign = center
}

input-field {
    monitor =
    size = $sddm_input_width, $sddm_input_height
    outline_thickness = $sddm_input_outline_thickness
    rounding = $sddm_input_rounding
    inner_color = $sddm_input_inner_color
    outer_color = $sddm_input_outline_color
    check_color = $sddm_accent_color
    fail_color = rgba(255,64,80,0.85)
    font_color = $sddm_input_font_color
    font_family = $sddm_input_font
    font_size = $sddm_input_font_size_scaled
    placeholder_text = $sddm_input_placeholder
    fade_on_empty = true
    hide_input = true
    dots_spacing = 0.4
    dots_center = true
    position = 0, 10
    halign = center
    valign = center
}

# hint line under the input
label {
    monitor =
    text = $sddm_hint_text
    color = $sddm_hint_color
    font_size = $sddm_hint_font_size_scaled
    font_family = $sddm_hint_font_family
    shadow_size = 4
    shadow_passes = 1
    position = $sddm_hint_pos_x, $sddm_hint_pos_y
    halign = $sddm_hint_halign
    valign = $sddm_hint_valign
}
