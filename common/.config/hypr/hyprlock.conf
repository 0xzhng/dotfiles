$HyprConfigDir = $HOME/.config/hypr
$ClockTextColor = rgba(206,230,240,1.0)
$SubduedTextColor = rgba(179,202,211,1.0)
$AccentColor = rgba(14,60,72,1.0)
$LockWallpaper = $HyprConfigDir/bg1.png
source = $HyprConfigDir/wallpaper-vars.conf
$LockWallpaper = $HyprWallpaper
$Scripts = $HyprConfigDir/scripts

background {
    monitor = *
    # lock screen should always reflect the wallpaper Hyprland is using
    path = $LockWallpaper
    color = rgb(0,0,0)
    blur_size = 3
    blur_passes = 2
    noise = 0.0117
    contrast = 1.3
    brightness = 0.6
    vibrancy = 0.21
    vibrancy_darkness = 0.0
}

label {
    monitor = *
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = $ClockTextColor
    font_size = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    shadow_size = 0
    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor = *
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = $ClockTextColor
    font_size = 112
    font_family = Adwaita Sans
    shadow_passes = 0
    shadow_size = 0
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor = *
    text = cmd[update:18000000] echo "<b><big> $(date +"%A") </big></b>"
    color = $SubduedTextColor
    font_size = 18
    font_family = JetBrainsMono NFM
    position = 0, -15
    halign = center
    valign = center
}

label {
    monitor = *
    text = cmd[update:18000000] echo "<b> $(date +"%d %b") </b>"
    color = $SubduedTextColor
    font_size = 14
    font_family = JetBrainsMono Nerd Font 10
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor = *
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    rounding = 22
    outer_color = $AccentColor
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $SubduedTextColor
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    position = 0, 120
    halign = center
    valign = bottom
}
